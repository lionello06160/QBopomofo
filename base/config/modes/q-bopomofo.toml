[mode]
id = "q-bopomofo"
name = "Q注音"
description = "QBopomofo 預設模式 — 標準注音 + 自訂詞頻調校"

[keyboard]
layout = "standard"
keymap = "qwerty"

[conversion]
engine = "chewing"

[dictionaries]
system = ["word.dat", "tsi.dat"]
custom = ["phrases.csv"]

[preferences]
shift_behavior = "smart_toggle"   # 短按切換中英，長按暫時英文
caps_lock_behavior = "none"                 # Caps Lock 不處理
candidates_per_page = 9
space_as_selection = true
esc_clear_all = true
auto_learn = true
